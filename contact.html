<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contacts</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      height: 100vh;
      background: linear-gradient(10deg, #E2C28E, #D2691E);
      display: flex;
      justify-content: center;
      align-items: center;
      color: sandybrown;
    }
    .contact-section {
      width: 80%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.7);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .contact-section h2 {
      font-size: 36px;
      margin-bottom: 30px;
      color: saddlebrown;
    }
    .contact-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 25px;
      margin-top: 20px;
    }
    .contact-item {
      background: beige;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
      overflow: hidden;
    }
    .contact-item:hover {
      transform: translateY(-5px);
    }
    .contact-item i {
      font-size: 28px;
      margin-bottom: 10px;
      color: #3e2723;
    }
    .contact-item p {
      margin: 0;
      font-size: 15px;
      color: #5d4037;
    }
    .contact-item a {
      color: #3e2723;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.6s ease, text-decoration 0.2s ease;
    }
    .contact-item a:hover {
      color: #1b0000;
      scale: 1 !important;
      text-decoration: underline;
    }
  </style>
</head>
